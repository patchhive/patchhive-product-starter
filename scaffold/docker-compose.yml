services:
  backend:
    build: ./backend
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "__BACKEND_PORT__:8000"
    volumes:
      - ./data:/data
    environment:
      - __ENV_PREFIX___DB_PATH=/data/__DB_FILE__
      - __ENV_PREFIX___PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "__FRONTEND_PORT__:8080"
    depends_on:
      - backend
    restart: unless-stopped
